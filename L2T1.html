<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Board</title>
<style>
body{
font-family: Arial;
margin:0;
background:#f4f6f9;
}
/* HEADER */
header{
background:#d1d2d4;
color:rgb(131, 54, 54);
padding:15px;
text-align:center;
}
nav{
display:flex;
justify-content:left;
gap:20px;
margin-top:10px;
}
nav button{
padding:8px 15px;
border:none;
background:#3498db;
color:green;
cursor:pointer;
}
/* SECTION */
section{
display:none;
padding:20px;
}
.active{
display:block;
}
/* JOB CARD */
.job-card{
background:blueviolet;
padding:15px;
margin:10px 0;
border-radius:6px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}
.job-card button{
margin-top:10px;
padding:5px 10px;
background:#27ae60;
color:brown;
border:none;
cursor:pointer;
}
/* FORM */
input, textarea{
width:100%;
padding:8px;
margin:5px 0 10px;
}
form button{
background:#3498db;
color:white;
border:none;
padding:10px;
cursor:pointer;
}
/* SEARCH */
#search{
padding:8px;
width:100%;
margin-bottom:15px;
}
/* FOOTER */
footer{
background:#2c3e50;
color:white;
text-align:center;
padding:10px;
margin-top:20px;
}
</style>
</head>
<body>
<header>
<h1>Job Board</h1>
<nav>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('jobs')">Jobs</button>
<button onclick="showPage('post')">Post Job</button>
</nav>
</header>
<!-- HOME -->
<section id="home" class="active">
<h2>Welcome</h2>
<p>Find your dream job or post job openings for candidates.</p>
</section>
<!-- JOB LIST -->
<section id="jobs">
<h2>Job Listings</h2>
<input type="text" id="search" placeholder="Search jobs..." onkeyup="searchJobs()">
<div id="jobList"></div>
</section>
<!-- POST JOB -->
<section id="post">
<h2>Post a Job</h2>
<form id="jobForm">
<input type="text" id="title" placeholder="Job Title" required>
<input type="text" id="company" placeholder="Company Name" required>
<textarea id="description" placeholder="Job Description" required></textarea>
<button type="submit">Post Job</button>
</form>
</section>
<!-- APPLY FORM -->
<section id="apply">
<h2>Apply Job</h2>
<form id="applyForm">
<input type="text" placeholder="Your Name" required>
<input type="email" placeholder="Email" required>
<input type="file" required>
<button type="submit">Submit Application</button>
</form>
</section>
<footer>
<p>job board created by Raja Babu</p>
</footer>
<script>
let jobs = [
{
title:"Frontend Developer",
company:"Google",
description:"Looking for HTML CSS JS developer"
},
{
title:"Backend Developer",
company:"Microsoft",
description:"Node.js and database experience required"
},
{
title:"Software developer",
company:"apple",
description:"looking for 5 year experience"
}
];
function showPage(page){
document.querySelectorAll("section").forEach(sec=>{
sec.classList.remove("active");
});
document.getElementById(page).classList.add("active");
}
function displayJobs(){
let jobList=document.getElementById("jobList");
jobList.innerHTML="";
jobs.forEach((job,index)=>{
jobList.innerHTML+=`
<div class="job-card">
<h3>${job.title}</h3>
<p><b>Company:</b> ${job.company}</p>
<p>${job.description}</p>
<button onclick="applyJob()">Apply</button>
</div>
`;
});
}
function searchJobs(){
let value=document.getElementById("search").value.toLowerCase();
let filtered=jobs.filter(job=>job.title.toLowerCase().includes(value));
let jobList=document.getElementById("jobList");
jobList.innerHTML="";
filtered.forEach(job=>{
jobList.innerHTML+=`
<div class="job-card">
<h3>${job.title}</h3>
<p><b>Company:</b> ${job.company}</p>
<p>${job.description}</p>
<button onclick="applyJob()">Apply</button>
</div>
`;
});
}
document.getElementById("jobForm").addEventListener("submit",function(e){
e.preventDefault();
let title=document.getElementById("title").value;
let company=document.getElementById("company").value;
let description=document.getElementById("description").value;
jobs.push({title,company,description});
alert("Job Posted Successfully");
displayJobs();
showPage("jobs");
});
function applyJob(){
showPage("apply");
}
document.getElementById("applyForm").addEventListener("submit",function(e){
e.preventDefault();
alert("Application Submitted Successfully");
showPage("jobs");
});
displayJobs();
</script>
</body>
</html>
