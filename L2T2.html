<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Quiz Maker</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
padding:0;
text-align:center;
}

header{
background:#2c3e50;
color:white;
padding:20px;
font-size:28px;
}

.container{
width:80%;
margin:auto;
margin-top:30px;
}

button{
padding:10px 20px;
border:none;
background:#3498db;
color:white;
cursor:pointer;
margin:10px;
border-radius:5px;
}

button:hover{
background:#2980b9;
}

input{
padding:8px;
margin:5px;
width:80%;
}

.quiz-box{
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.option{
display:block;
background:#ecf0f1;
margin:8px;
padding:10px;
border-radius:5px;
cursor:pointer;
}

.option:hover{
background:#dcdde1;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<header>Online Quiz Maker</header>

<div class="container">

<button onclick="showCreate()">Create Quiz</button>
<button onclick="showQuiz()">Take Quiz</button>

<div id="create" class="quiz-box hidden">

<h2>Create Quiz Question</h2>

<input id="question" placeholder="Enter Question">

<input id="op1" placeholder="Option 1">
<input id="op2" placeholder="Option 2">
<input id="op3" placeholder="Option 3">
<input id="op4" placeholder="Option 4">

<input id="correct" placeholder="Correct Option Number (1-4)">

<br>
<button onclick="addQuestion()">Add Question</button>

<p id="msg"></p>

</div>


<div id="quiz" class="quiz-box hidden">

<h2>Quiz</h2>

<div id="questionBox"></div>

<div id="optionsBox"></div>

<button onclick="nextQuestion()">Next</button>

</div>


<div id="result" class="quiz-box hidden">
<h2>Your Score</h2>
<p id="score"></p>
</div>

</div>


<script>

let quizData=[];
let current=0;
let score=0;

function showCreate(){
document.getElementById("create").classList.remove("hidden");
document.getElementById("quiz").classList.add("hidden");
}

function showQuiz(){

if(quizData.length==0){
alert("Please create quiz first");
return;
}

current=0;
score=0;

document.getElementById("create").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");

loadQuestion();
}

function addQuestion(){

let q=document.getElementById("question").value;
let op1=document.getElementById("op1").value;
let op2=document.getElementById("op2").value;
let op3=document.getElementById("op3").value;
let op4=document.getElementById("op4").value;
let correct=document.getElementById("correct").value;

quizData.push({
question:q,
options:[op1,op2,op3,op4],
correct:correct
});

document.getElementById("msg").innerText="Question Added!";

document.getElementById("question").value="";
document.getElementById("op1").value="";
document.getElementById("op2").value="";
document.getElementById("op3").value="";
document.getElementById("op4").value="";
document.getElementById("correct").value="";
}

function loadQuestion(){

let q=quizData[current];

document.getElementById("questionBox").innerHTML="<h3>"+q.question+"</h3>";

let optionsHTML="";

q.options.forEach((opt,i)=>{
optionsHTML+=`<div class="option" onclick="selectOption(${i+1})">${opt}</div>`;
});

document.getElementById("optionsBox").innerHTML=optionsHTML;

}

let selected=null;

function selectOption(num){
selected=num;
}

function nextQuestion(){

if(selected==quizData[current].correct){
score++;
}

selected=null;

current++;

if(current<quizData.length){
loadQuestion();
}
else{
showResult();
}

}

function showResult(){

document.getElementById("quiz").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");

document.getElementById("score").innerText=
"You scored "+score+" out of "+quizData.length;

}

</script>

</body>
</html>
