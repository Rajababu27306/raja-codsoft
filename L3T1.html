<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>E-Commerce Website</title>

<style>

body{
font-family:Arial;
margin:0;
background:#07113a;
}

/* HEADER */

header{
background:#491df7;
color:white;
padding:20px;
text-align:center;
}

/* PRODUCT SECTION */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px;
}

/* PRODUCT CARD */

.product{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.product img{
width:100%;
height:160px;
object-fit:cover;
}

.product button{
background:#3498db;
border:none;
color:white;
padding:8px 15px;
border-radius:5px;
cursor:pointer;
}

.product button:hover{
background:#2980b9;
}

/* CART SECTION */

.cart{
background:white;
margin:30px;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.cart h2{
margin-top:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:8px 0;
}

.total{
font-weight:bold;
margin-top:15px;
}

.checkout{
background:#e22a3d;
border:none;
color:white;
padding:10px;
width:150px;
margin-top:10px;
cursor:pointer;
border-radius:5px;
}

.checkout:hover{
background:#1e8449;
}

</style>
</head>

<body>

<!-- HEADER -->

<header>
<h1>My E-Commerce Store</h1>
<p>Simple Shopping Website created by Raja Babu</p>
</header>

<!-- PRODUCT LIST -->

<section class="products" id="product-list"></section>

<!-- SHOPPING CART -->

<section class="cart">

<h2>Shopping Cart</h2>

<div id="cart-items"></div>

<div class="total">
Total Price: ₹<span id="total">0</span>
</div>

<button class="checkout" onclick="checkout()">Checkout</button>

</section>

<script>

/* PRODUCT DATA */

const products=[
{id:1,name:"Headphones",price:1500,img:"https://th.bing.com/th/id/OIP._wUwheyqBjW6zUDahh7C8gHaJO?w=147&h=183&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3"},
{id:2,name:"Smart Watch",price:2500,img:"https://th.bing.com/th/id/OIP.wS7CKGFJRnyX7NeyFFptuwHaEJ?w=329&h=185&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3"},
{id:3,name:"Laptop Bag",price:1200,img:"https://th.bing.com/th/id/OIP.s0Xw06XxeC5QSZ6AB6HcDwHaGc?w=193&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3"},
{id:4,name:"Wireless Mouse",price:800,img:"https://th.bing.com/th/id/OIP.lER3YZebzgAqm9sp2AA1kwHaHa?w=178&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3"},
{id:5,name:"Keyboard",price:1000,img:"https://th.bing.com/th/id/OIP.P2xUligW6j0BfHhK5nAbcgHaEl?w=277&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3"}
];

let cart=[];

/* DISPLAY PRODUCTS */

const productList=document.getElementById("product-list");

products.forEach(p=>{

productList.innerHTML+=`

<div class="product">

<img src="${p.img}">

<h3>${p.name}</h3>

<p>Price: ₹${p.price}</p>

<button onclick="addToCart(${p.id})">
Add to Cart
</button>

</div>

`;

});

/* ADD TO CART */

function addToCart(id){

const product=products.find(p=>p.id===id);

cart.push(product);

updateCart();

}

/* UPDATE CART */

function updateCart(){

const cartItems=document.getElementById("cart-items");

cartItems.innerHTML="";

let total=0;

cart.forEach((item,index)=>{

total+=item.price;

cartItems.innerHTML+=`

<div class="cart-item">

<span>${item.name} - ₹${item.price}</span>

<button onclick="removeItem(${index})">Remove</button>

</div>

`;

});

document.getElementById("total").innerText=total;

}

/* REMOVE ITEM */

function removeItem(index){

cart.splice(index,1);

updateCart();

}

/* CHECKOUT */

function checkout(){

if(cart.length===0){
alert("Cart is empty!");
return;
}

alert("Order placed successfully!");

cart=[];

updateCart();

}

</script>

</body>
</html>
